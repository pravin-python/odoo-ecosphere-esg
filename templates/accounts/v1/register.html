{% extends "layout/auth.html" %}
{% load static %}

{% block title %}Create account — EcoSphere ESG{% endblock %}

{% block content %}
<div class="w-full max-w-md">
    <div class="mb-8 flex flex-col items-center">
        <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-600 text-2xl font-bold text-white shadow-lg shadow-brand-600/30">E</span>
        <h1 class="mt-4 text-2xl font-bold text-slate-900">Create your account</h1>
        <p class="mt-1 text-sm text-slate-500">Join your organization's ESG workspace</p>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-xl shadow-slate-200/50">
        <div id="register-error"
             class="hidden mb-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
             role="alert"></div>

        <form id="register-form" class="space-y-4" novalidate>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label for="first_name" class="block text-sm font-medium text-slate-700">First name</label>
                    <input id="first_name" name="first_name" type="text" autocomplete="given-name"
                           class="mt-1.5 block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 transition">
                </div>
                <div>
                    <label for="last_name" class="block text-sm font-medium text-slate-700">Last name</label>
                    <input id="last_name" name="last_name" type="text" autocomplete="family-name"
                           class="mt-1.5 block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 transition">
                </div>
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" required
                       class="mt-1.5 block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 transition">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required
                       class="mt-1.5 block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 transition">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" required
                       class="mt-1.5 block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 transition">
            </div>

            <div>
                <label for="password_confirm" class="block text-sm font-medium text-slate-700">Confirm password</label>
                <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required
                       class="mt-1.5 block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 transition">
            </div>

            <button id="register-submit" type="submit"
                    class="flex w-full items-center justify-center gap-2 rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500/50 disabled:cursor-not-allowed disabled:opacity-70 transition">
                <svg id="register-spinner" class="hidden h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span id="register-label">Create account</span>
            </button>
        </form>
    </div>

    <p class="mt-6 text-center text-sm text-slate-500">
        Already have an account?
        <a href="{% url 'core_v1:login' %}" class="font-medium text-brand-600 hover:text-brand-700">Sign in</a>
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth-register.js' %}"></script>
{% endblock %}
