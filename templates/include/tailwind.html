{% comment %}
Tailwind via the Play CDN — no build step, no custom CSS anywhere.
For production, swap this for a compiled Tailwind build (tailwindcss CLI ->
a static stylesheet) to drop the CDN runtime and its console warning.
{% endcomment %}
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          // Official Odoo Enterprise palette.
          odoo: {
            purple: "#714B67",        // primary brand — navbar, sidebar accents
            "purple-dark": "#5e3e56", // hover
            teal: "#017E84",          // action — primary buttons, active tabs, links
            "teal-dark": "#006e74",   // hover
            bg: "#F8F9FA",            // app background (light)
            border: "#E5E7EB",        // card / table borders
            text: "#212529",          // headings / standard text
            muted: "#495057",         // secondary / muted text
          },
        },
        fontFamily: {
          sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
        },
      },
    },
  };
</script>
