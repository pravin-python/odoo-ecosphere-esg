{% extends "layout/auth.html" %}

{% block title %}EcoSphere ESG{% endblock %}

{% block content %}
<div class="flex flex-col items-center gap-4 text-slate-500">
    <svg class="h-8 w-8 animate-spin text-brand-600" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <p class="text-sm">Loading EcoSphere…</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
  // Route to the right place based on whether a session token exists.
  window.location.replace(window.API.isAuthenticated() ? "/dashboard/" : "/login/");
</script>
{% endblock %}
