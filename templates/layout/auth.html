{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EcoSphere ESG{% endblock %}</title>
    {% include "include/tailwind.html" %}
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gradient-to-br from-brand-50 via-white to-teal-50 text-slate-800 antialiased">
    <div class="min-h-full flex flex-col items-center justify-center px-4 py-12">
        {% block content %}{% endblock %}
    </div>
    <script src="{% static 'js/api.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
