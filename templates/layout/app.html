{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EcoSphere ESG{% endblock %}</title>
    {% include "include/tailwind.html" %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-slate-950 text-slate-200 antialiased">
    <div class="flex h-full">
        {% include "include/sidebar.html" %}

        <div class="flex min-w-0 flex-1 flex-col">
            <header class="flex h-16 shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900/60 px-4 sm:px-6">
                <div class="flex items-center gap-3">
                    <button id="sidebar-toggle" type="button"
                            class="rounded-lg p-2 text-slate-400 hover:bg-slate-800 lg:hidden">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
                        </svg>
                    </button>
                    <h1 class="text-lg font-semibold text-white">{% block page_title %}Dashboard{% endblock %}</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div class="hidden text-right sm:block">
                        <p id="nav-user-name" class="text-sm font-medium text-white">&nbsp;</p>
                        <p id="nav-user-role" class="text-xs text-slate-400">&nbsp;</p>
                    </div>
                    <button id="logout-btn" type="button"
                            class="inline-flex items-center gap-1.5 rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-200 hover:bg-slate-700 transition">
                        Sign out
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/app-shell.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
